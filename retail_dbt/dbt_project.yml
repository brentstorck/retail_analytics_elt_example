name: 'retail_analytics'
version: '1.0.0'
config-version: 2

# This profile is defined in the profiles.yml shipped alongside this file. Run dbt with
# DBT_PROFILES_DIR pointed here (the pipeline and run.ps1 do this for you).
profile: 'retail_analytics'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
analysis-paths: ["analyses"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets: ["target", "dbt_packages", "logs"]

require-dbt-version: [">=1.7.0", "<2.0.0"]

# Layered build: staging/intermediate as ephemeral-cheap views, marts as durable tables
# that BI reads. Custom schemas (staging/intermediate/marts/seeds) are emitted verbatim
# via the generate_schema_name macro override.
models:
  retail_analytics:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

seeds:
  retail_analytics:
    +schema: seeds
